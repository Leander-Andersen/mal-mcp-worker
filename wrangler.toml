name = "mal-mcp-worker-v2"
main = "src/index.ts"
compatibility_date = "2026-04-02"

# ─── Secrets (set via `wrangler secret put <NAME>`, never commit values) ───────
# MAL_CLIENT_ID       – MyAnimeList OAuth app client ID
# MAL_CLIENT_SECRET   – MyAnimeList OAuth app client secret
# SESSION_SECRET      – 32-byte hex string used to HMAC-sign session tokens
#                       Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
# For local dev: copy .dev.vars.example to .dev.vars and fill in all three values.

# ─── KV namespace ───────────────────────────────────────────────────────────────
# Create namespaces with:
#   wrangler kv namespace create MAL_KV
#   wrangler kv namespace create MAL_KV --preview
# Then replace the placeholder IDs below with the output from those commands.
[[kv_namespaces]]
binding = "MAL_KV"
id = "d673eb80cb2a47ec8d53e4331bd8caf3"
preview_id = "d673eb80cb2a47ec8d53e4331bd8caf3"
